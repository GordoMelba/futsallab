<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futsal Lab</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:0;
}

button{
padding:15px;
font-size:18px;
margin:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

.screen{
display:none;
padding:20px;
}

#menu{
display:block;
}

.card{
background:#1e293b;
margin:10px;
padding:15px;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

</style>

</head>


<body>

<div id="menu" class="screen">

<h1>Futsal Lab</h1>

<button onclick="abrirEquipos()">Equipos</button>
<button onclick="alert('Nuevo partido luego')">Nuevo partido</button>
<button onclick="alert('Estadísticas luego')">Estadísticas</button>

</div>



<div id="equiposScreen" class="screen">

<h2>Equipos</h2>

<button onclick="crearEquipo()">Crear equipo</button>

<div id="listaEquipos"></div>

<br>

<button onclick="volverMenu()">Volver</button>

</div>



<div id="equipoDetalle" class="screen">

<h2 id="nombreEquipo"></h2>

<button onclick="agregarJugador()">Agregar jugador</button>

<div id="listaJugadores"></div>

<br>

<button onclick="volverEquipos()">Volver</button>

</div>



<script>

let db = JSON.parse(localStorage.getItem("futsalDB")) || {equipos:[]};

function guardarDB(){
localStorage.setItem("futsalDB",JSON.stringify(db));
}


function mostrarPantalla(id){

document.querySelectorAll(".screen").forEach(s=>{
s.style.display="none";
});

document.getElementById(id).style.display="block";

}



function volverMenu(){
mostrarPantalla("menu");
}



function abrirEquipos(){

mostrarPantalla("equiposScreen");

renderEquipos();

}



function crearEquipo(){

let nombre = prompt("Nombre del equipo");

if(!nombre) return;

let equipo={
id:Date.now(),
nombre:nombre,
jugadores:[]
};

db.equipos.push(equipo);

guardarDB();

renderEquipos();

}



function renderEquipos(){

let cont=document.getElementById("listaEquipos");

cont.innerHTML="";

db.equipos.forEach(e=>{

let div=document.createElement("div");

div.className="card";

div.innerHTML=`
<h3>${e.nombre}</h3>
<button onclick="abrirEquipo(${e.id})">Abrir</button>
`;

cont.appendChild(div);

});

}



let equipoActual=null;



function abrirEquipo(id){

equipoActual=db.equipos.find(e=>e.id===id);

document.getElementById("nombreEquipo").innerText=equipoActual.nombre;

mostrarPantalla("equipoDetalle");

renderJugadores();

}



function volverEquipos(){

mostrarPantalla("equiposScreen");

}



function agregarJugador(){

let nombre=prompt("Nombre jugador");

if(!nombre) return;

let jugador={
id:Date.now(),
nombre:nombre
};

equipoActual.jugadores.push(jugador);

guardarDB();

renderJugadores();

}



function eliminarJugador(id){

equipoActual.jugadores=equipoActual.jugadores.filter(j=>j.id!==id);

guardarDB();

renderJugadores();

}



function renderJugadores(){

let cont=document.getElementById("listaJugadores");

cont.innerHTML="";

equipoActual.jugadores.forEach(j=>{

let div=document.createElement("div");

div.className="card";

div.innerHTML=`
${j.nombre}
<br>
<button onclick="eliminarJugador(${j.id})">Eliminar</button>
`;

cont.appendChild(div);

});

}

</script>

</body>

</html>
