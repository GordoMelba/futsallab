<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futsal Lab</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.screen{
display:none;
padding:20px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin:6px;
}

.primary{background:#22c55e;color:white}
.secondary{background:#e5e7eb;color:black}
.danger{background:#dc2626;color:white}

input,select{
padding:10px;
border-radius:8px;
border:none;
margin:6px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:10px;
}

.menu{
display:flex;
flex-direction:column;
align-items:center;
margin-top:40px;
gap:16px;
}

.menu button{
width:260px;
font-size:22px;
}

.match-layout{
display:grid;
grid-template-columns:1fr 280px;
gap:12px;
}

.court{
background:#16a3d2;
aspect-ratio:2/1;
border:5px solid white;
position:relative;
}

.sidepanel{
background:#111827;
padding:12px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:14px;
}

.bigtime{
font-size:34px;
text-align:center;
}

.logoInstall{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
gap:20px;
}

.playerPhoto{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

</style>
</head>

<body>

<div id="installScreen" class="logoInstall">

<img src="logoletras.png" width="280">

<img src="icon.png" width="90">

<button id="installBtn" class="primary" style="display:none">
Instalar app
</button>

</div>


<div id="menuScreen" class="screen">

<h1>Futsal Lab</h1>

<div class="menu">

<button class="secondary" onclick="openNewMatch()">Nuevo partido</button>

<button class="secondary" onclick="openTeams()">Equipos</button>

<button class="secondary" onclick="alert('Estadísticas luego')">Estadísticas</button>

<button class="secondary">Entrenamientos</button>

</div>

</div>


<div id="teamsScreen" class="screen">

<h2>Equipos</h2>

<button class="primary" onclick="createTeam()">Crear equipo</button>
<button onclick="goMenu()">Volver</button>

<div id="teamsList"></div>

</div>


<div id="teamDetailScreen" class="screen">

<h2 id="teamName"></h2>

<input type="file" id="teamLogoInput">

<button onclick="saveTeamLogo()">Guardar escudo</button>

<h3>Jugadores</h3>

<button class="primary" onclick="showPlayerForm()">Agregar jugador</button>

<div id="playersList"></div>

<button onclick="openTeams()">Volver</button>

</div>


<div id="playerFormScreen" class="screen">

<h2>Nuevo jugador</h2>

<input id="playerName" placeholder="Nombre">
<input id="playerNumber" placeholder="Número">
<input id="playerPosition" placeholder="Posición">
<input id="playerFoot" placeholder="Pierna hábil">
<input id="playerWeight" placeholder="Peso">
<input id="playerHeight" placeholder="Altura">

<input type="file" id="playerPhoto">

<button class="primary" onclick="savePlayer()">Guardar jugador</button>

<button onclick="backTeam()">Cancelar</button>

</div>


<div id="matchSetup" class="screen">

<h2>Nuevo partido</h2>

<select id="teamSelect"></select>

<input id="rivalInput" placeholder="Rival">

<input type="date" id="dateInput">

<input id="competitionInput" placeholder="Competencia">

<h3>Jugadores citados</h3>

<div id="calledPlayers"></div>

<button class="primary" onclick="startMatch()">Iniciar partido</button>

<button onclick="goMenu()">Volver</button>

</div>


<div id="matchScreen" class="screen">

<div class="match-layout">

<div>

<div class="court"></div>

</div>

<div class="sidepanel">

<div>

<div>PRIMER TIEMPO</div>

<div id="clock" class="bigtime">00:00</div>

<button onclick="play()">Play</button>

<button onclick="pause()">Pausa</button>

<button onclick="stop()">Stop</button>

</div>

<div>

<h4>MINUTOS</h4>

<button onclick="gestionarMinutos()">MINUTOS</button>
<div id="onCourt"></div>

</div>

<div>

<h4>Estadísticas</h4>

<button>Ver estadísticas</button>

</div>

<button onclick="goMenu()">Volver menú</button>

</div>

</div>

</div>


<script>

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

let deferredPrompt;

const installBtn=document.getElementById("installBtn");

const isStandalone =
window.matchMedia("(display-mode: standalone)").matches ||
window.navigator.standalone===true;

if(isStandalone){

document.getElementById("installScreen").style.display="none";

document.getElementById("menuScreen").style.display="block";

}

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

installBtn.style.display="block";

});

installBtn.addEventListener("click",async()=>{

deferredPrompt.prompt();

await deferredPrompt.userChoice;

});

let db=JSON.parse(localStorage.getItem("futsalDB"))||{equipos:[]};

function saveDB(){
localStorage.setItem("futsalDB",JSON.stringify(db));
}

function hideScreens(){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
}

function goMenu(){
hideScreens();
menuScreen.style.display="block";
}

function openTeams(){
hideScreens();
teamsScreen.style.display="block";
renderTeams();
}

function createTeam(){

let name=prompt("Nombre del equipo");

if(!name)return;

db.equipos.push({
id:Date.now(),
nombre:name,
escudo:"",
jugadores:[]
});

saveDB();

renderTeams();

}

function renderTeams(){

let container=document.getElementById("teamsList");

container.innerHTML="";

db.equipos.forEach(t=>{

let div=document.createElement("div");

div.className="card";

div.innerHTML=`
<h3>${t.nombre}</h3>
<button onclick="openTeam(${t.id})">Abrir</button>
`;

container.appendChild(div);

});

}

let currentTeam=null;

function openTeam(id){

currentTeam=db.equipos.find(t=>t.id===id);

hideScreens();

teamDetailScreen.style.display="block";

teamName.innerText=currentTeam.nombre;

renderPlayers();

}

function renderPlayers(){

let list=document.getElementById("playersList");

list.innerHTML="";

currentTeam.jugadores.forEach(p=>{

let div=document.createElement("div");

div.className="card";

div.innerHTML=`
<img src="${p.foto}" class="playerPhoto">
<b>${p.nombre}</b>
<button onclick="deletePlayer(${p.id})">Eliminar</button>
`;

list.appendChild(div);

});

}

function showPlayerForm(){

hideScreens();

playerFormScreen.style.display="block";

}

function savePlayer(){

let fotoURL="";

let file=document.getElementById("playerPhoto").files[0];

if(file){
fotoURL=URL.createObjectURL(file);
}

currentTeam.jugadores.push({

id:Date.now(),

nombre:playerName.value,

numero:playerNumber.value,

posicion:playerPosition.value,

pierna:playerFoot.value,

peso:playerWeight.value,

altura:playerHeight.value,

foto:fotoURL

});

saveDB();

openTeam(currentTeam.id);

}

function deletePlayer(id){

currentTeam.jugadores=currentTeam.jugadores.filter(p=>p.id!==id);

saveDB();

renderPlayers();

}

function backTeam(){

openTeam(currentTeam.id);

}

function openNewMatch(){

hideScreens();

matchSetup.style.display="block";

let select=document.getElementById("teamSelect");

select.innerHTML="";

db.equipos.forEach(t=>{

let o=document.createElement("option");

o.value=t.id;

o.text=t.nombre;

select.appendChild(o);

});

}

let seconds=0;

let timer=null;

let jugadoresEnCancha = [];
let eventosPartido = [];
let ultimoTick = 0;

// CLICK EN CANCHA

document.addEventListener("click",function(e){

if(!e.target.closest(".court")) return;

if(!timer) return;

let cancha = document.querySelector(".court");

let rect = cancha.getBoundingClientRect();

let x = (e.clientX - rect.left) / rect.width * 100;
let y = (e.clientY - rect.top) / rect.height * 100;

abrirMenuEvento(x,y);

});

function abrirMenuEvento(x,y){

if(jugadoresEnCancha.length===0){
alert("Primero seleccioná los jugadores en cancha en MINUTOS");
return;
}

let tipo = prompt("Evento: remate / falta / perdida / recuperacion / tarjeta");

if(!tipo) return;

let subtipo="";

if(tipo==="remate"){
subtipo = prompt("desviado / al arco / gol");
}

if(tipo==="tarjeta"){
subtipo = prompt("amarilla / roja");
}

let nombres = jugadoresEnCancha.map(j=>j.nombre).join(", ");

let jugador = prompt("Jugador: "+nombres);

if(!jugador) return;

let jugadorObj = jugadoresEnCancha.find(j=>j.nombre===jugador);

if(!jugadorObj){
alert("Jugador no válido");
return;
}

eventosPartido.push({
tiempo:seconds,
tipo:tipo,
subtipo:subtipo,
jugador:jugadorObj.id,
x:x,
y:y
});

dibujarEvento(x,y,tipo);

}

function dibujarEvento(x,y,tipo){

let punto=document.createElement("div");

punto.style.position="absolute";
punto.style.width="12px";
punto.style.height="12px";
punto.style.borderRadius="50%";

if(tipo==="remate") punto.style.background="red";
else punto.style.background="yellow";

punto.style.left=x+"%";
punto.style.top=y+"%";

document.querySelector(".court").appendChild(punto);

}

function play(){

if(timer)return;

timer=setInterval(()=>{

seconds++;

updateClock();

},1000);

}

function pause(){

clearInterval(timer);

timer=null;

}

function stop(){

pause();

seconds=0;

updateClock();

}

function updateClock(){

let m=Math.floor(seconds/60).toString().padStart(2,"0");

let s=(seconds%60).toString().padStart(2,"0");

clock.innerText=m+":"+s;

}

  // INICIAR PARTIDO

function startMatch(){

let teamId = document.getElementById("teamSelect").value;

if(!teamId){
alert("Seleccioná un equipo");
return;

let teamId = document.getElementById("teamSelect").value;

let equipo = db.equipos.find(e=>e.id==teamId);

jugadoresEnCancha = equipo.jugadores.slice(0,5);

actualizarPanelMinutos();
  
}

function gestionarMinutos(){

let teamId = document.getElementById("teamSelect").value;

let equipo = db.equipos.find(e=>e.id==teamId);

let nombres = equipo.jugadores.map(j=>j.nombre).join(", ");

let sale = prompt("Jugador que sale: "+nombres);

let entra = prompt("Jugador que entra: "+nombres);

let jugadorSale = equipo.jugadores.find(j=>j.nombre===sale);
let jugadorEntra = equipo.jugadores.find(j=>j.nombre===entra);

if(!jugadorSale || !jugadorEntra){
alert("Jugador no válido");
return;
}

jugadoresEnCancha = jugadoresEnCancha.filter(j=>j.id!==jugadorSale.id);

jugadoresEnCancha.push(jugadorEntra);

actualizarPanelMinutos();

}

function actualizarPanelMinutos(){

let cont = document.getElementById("onCourt");

cont.innerHTML = jugadoresEnCancha.map(j=>j.nombre).join("<br>");

}
  

let rival = document.getElementById("rivalInput").value;

if(!rival){
alert("Ingresá el rival");
return;
}

hideScreens();

document.getElementById("matchScreen").style.display="block";

document.querySelector(".court").innerHTML = `
<div style="position:absolute;left:50%;top:0;width:4px;height:100%;background:white"></div>

<div style="position:absolute;left:50%;top:50%;width:120px;height:120px;border:4px solid white;border-radius:50%;transform:translate(-50%,-50%)"></div>

<div style="position:absolute;left:0;top:15%;width:100px;height:70%;border:4px solid white;border-left:none;border-radius:0 80px 80px 0"></div>

<div style="position:absolute;right:0;top:15%;width:100px;height:70%;border:4px solid white;border-right:none;border-radius:80px 0 0 80px"></div>

<div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);padding:6px;border-radius:6px;font-size:12px">ARCO PROPIO</div>

<div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);padding:6px;border-radius:6px;font-size:12px">ARCO RIVAL</div>
`;

document.getElementById("onCourt").innerText="Seleccionar jugadores en MINUTOS";

seconds = 0;

updateClock();

}

</script>

</body>
</html>
