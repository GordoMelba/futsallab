<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futsal Lab</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 20px;
    }

    .center-screen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      text-align: center;
      padding: 24px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      cursor: pointer;
      margin: 4px;
    }

    input, select {
      width: 100%;
      padding: 11px 12px;
      border: none;
      border-radius: 8px;
      margin: 6px 0;
      font-size: 16px;
    }

    .primary { background: #22c55e; color: white; }
    .secondary { background: #e5e7eb; color: #111827; }
    .danger { background: #dc2626; color: white; }
    .darkbtn { background: #334155; color: white; }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      margin-top: 28px;
    }

    .menu-buttons button {
      width: 280px;
      max-width: 90vw;
      font-size: 22px;
      padding: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 14px;
      margin: 10px 0;
    }

    .small {
      font-size: 14px;
      opacity: 0.9;
    }

    .team-logo {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 10px;
      background: #0b1220;
      display: inline-block;
      vertical-align: middle;
      margin-right: 12px;
    }

    .player-photo {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 50%;
      background: #0b1220;
      display: inline-block;
      vertical-align: middle;
      margin-right: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .setup-section {
      background: #1e293b;
      border-radius: 14px;
      padding: 16px;
      margin: 14px 0;
    }

    .check-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .check-item {
      background: #334155;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .match-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 14px;
      align-items: start;
    }

    .match-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .match-header {
      background: #1e293b;
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      font-size: 15px;
    }

    .court-wrap {
      background: #0b1220;
      border-radius: 18px;
      padding: 12px;
    }

    .court {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 1;
      background: #16a3d2;
      border: 5px solid white;
      overflow: hidden;
      cursor: crosshair;
    }

    .midline {
      position: absolute;
      left: 50%;
      top: 0;
      width: 4px;
      height: 100%;
      background: white;
      transform: translateX(-50%);
    }

    .center-circle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16%;
      aspect-ratio: 1 / 1;
      border: 4px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .penalty-left,
    .penalty-right {
      position: absolute;
      top: 14%;
      width: 12%;
      height: 72%;
      border: 4px solid white;
    }

    .penalty-left {
      left: -2px;
      border-right: none;
      border-radius: 0 120px 120px 0;
    }

    .penalty-right {
      right: -2px;
      border-left: none;
      border-radius: 120px 0 0 120px;
    }

    .goal-label {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      background: rgba(0,0,0,.55);
      border-radius: 8px;
      padding: 6px 10px;
      z-index: 3;
    }

    .goal-own { left: 8px; }
    .goal-rival { right: 8px; }

    .event-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid white;
      z-index: 2;
    }

    .dot-own { background: #22c55e; }
    .dot-rival { background: #ef4444; }

    .sidepanel {
      background: #111827;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 300px;
    }

    .panel-box {
      background: #1f2937;
      border-radius: 12px;
      padding: 12px;
    }

    .bigclock {
      font-size: 36px;
      text-align: center;
      font-weight: bold;
      margin: 8px 0 10px;
    }

    .period-label {
      text-align: center;
      font-weight: bold;
      font-size: 15px;
    }

    .mini-title {
      font-size: 13px;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }

    .oncourt-list {
      line-height: 1.7;
      font-size: 15px;
    }

    .stats-live {
      line-height: 1.8;
      font-size: 15px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: min(900px, 96vw);
      max-height: 90vh;
      overflow: auto;
      background: #0f172a;
      border-radius: 18px;
      padding: 18px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .player-chip {
      background: #334155;
      color: white;
      border-radius: 10px;
      padding: 10px;
      margin: 6px 0;
      cursor: pointer;
    }

    .player-chip.selected {
      background: #22c55e;
    }

    .player-chip.bench {
      background: #475569;
    }

    .event-side {
      border-radius: 14px;
      padding: 14px;
    }

    .event-own {
      background: #14532d;
    }

    .event-rival {
      background: #7f1d1d;
    }

    .event-btn {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .hidden {
      display: none !important;
    }

    .thumb-preview {
      display: block;
      margin-top: 10px;
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
      background: #0b1220;
    }

    @media (max-width: 980px) {
      .match-layout {
        grid-template-columns: 1fr;
      }

      .grid-2, .check-list, .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div id="installScreen" class="center-screen">
    <img src="logoletras.png" alt="Logo" style="max-width:280px; width:80%;">
    <img src="icon.png" alt="Icono" style="width:90px; height:90px; object-fit:cover; border-radius:18px;">
    <button id="installBtn" class="primary" style="display:none;">Instalar app</button>
  </div>

  <div id="menuScreen" class="screen">
    <h1>Futsal Lab</h1>
    <div class="menu-buttons">
      <button class="secondary" onclick="openNewMatchSetup()">Nuevo partido</button>
      <button class="secondary" onclick="openTeamsScreen()">Equipos</button>
      <button class="secondary" onclick="alert('Estadísticas acumuladas: próximo bloque')">Estadísticas</button>
      <button class="secondary" onclick="alert('Entrenamientos: próximo bloque')">Entrenamientos</button>
    </div>
  </div>

  <div id="teamsScreen" class="screen">
    <div class="topbar">
      <h2>Equipos</h2>
      <div>
        <button class="primary" onclick="createTeam()">Crear equipo</button>
        <button class="secondary" onclick="goMenu()">Volver</button>
      </div>
    </div>
    <div id="teamsList"></div>
  </div>

  <div id="teamDetailScreen" class="screen">
    <div class="topbar">
      <h2 id="teamDetailTitle">Equipo</h2>
      <div>
        <button class="primary" onclick="showPlayerForm()">Agregar jugador</button>
        <button class="secondary" onclick="openTeamsScreen()">Volver</button>
      </div>
    </div>

    <div class="card">
      <div class="mini-title">Escudo del club</div>
      <input type="file" id="teamLogoInput" accept="image/*">
      <button class="secondary" onclick="saveTeamLogo()">Guardar escudo</button>
      <img id="teamLogoPreview" class="thumb-preview hidden" alt="Escudo">
    </div>

    <div id="teamPlayersList"></div>
  </div>

  <div id="playerFormScreen" class="screen">
    <div class="topbar">
      <h2>Nuevo jugador</h2>
      <button class="secondary" onclick="backToTeamDetail()">Cancelar</button>
    </div>

    <div class="card">
      <div class="grid-2">
        <div>
          <label>Nombre</label>
          <input id="playerNameInput" placeholder="Nombre">
        </div>
        <div>
          <label>Número</label>
          <input id="playerNumberInput" placeholder="Número">
        </div>
        <div>
          <label>Posición</label>
          <input id="playerPositionInput" placeholder="Posición">
        </div>
        <div>
          <label>Pierna hábil</label>
          <input id="playerFootInput" placeholder="Pierna hábil">
        </div>
        <div>
          <label>Peso</label>
          <input id="playerWeightInput" placeholder="Peso">
        </div>
        <div>
          <label>Altura</label>
          <input id="playerHeightInput" placeholder="Altura">
        </div>
      </div>

      <div style="margin-top:10px;">
        <label>Foto del jugador</label>
        <input type="file" id="playerPhotoInput" accept="image/*">
        <img id="playerPhotoPreview" class="thumb-preview hidden" alt="Foto jugador">
      </div>

      <div style="margin-top:16px;">
        <button class="primary" onclick="savePlayer()">Guardar jugador</button>
      </div>
    </div>
  </div>

  <div id="newMatchSetupScreen" class="screen">
    <div class="topbar">
      <h2>Nuevo partido</h2>
      <button class="secondary" onclick="goMenu()">Volver</button>
    </div>

    <div class="setup-section">
      <div class="grid-2">
        <div>
          <label>Equipo</label>
          <select id="matchTeamSelect"></select>
        </div>
        <div>
          <label>Rival</label>
          <input id="matchRivalInput" placeholder="Rival">
        </div>
        <div>
          <label>Fecha</label>
          <input id="matchDateInput" type="date">
        </div>
        <div>
          <label>Competencia / Torneo</label>
          <input id="matchCompetitionInput" placeholder="Competencia / Torneo">
        </div>
      </div>
    </div>

    <div class="setup-section">
      <div class="mini-title">Jugadores citados</div>
      <div id="calledPlayersList" class="check-list"></div>
    </div>

    <div class="setup-section">
      <div class="mini-title">5 jugadores que comienzan en cancha</div>
      <div id="startersList" class="check-list"></div>
    </div>

    <button class="primary" onclick="startMatch()">Iniciar partido</button>
  </div>

  <div id="matchScreen" class="screen">
    <div class="match-layout">
      <div class="match-main">
        <div id="matchHeader" class="match-header"></div>

        <div class="court-wrap">
          <div id="court" class="court">
            <div class="midline"></div>
            <div class="center-circle"></div>
            <div class="penalty-left"></div>
            <div class="penalty-right"></div>
            <div class="goal-label goal-own">ARCO PROPIO</div>
            <div class="goal-label goal-rival">ARCO RIVAL</div>
          </div>
        </div>
      </div>

      <div class="sidepanel">
        <div class="panel-box">
          <div id="periodLabel" class="period-label">PRIMER TIEMPO</div>
          <div id="clockDisplay" class="bigclock">00:00</div>
          <div style="text-align:center;">
            <button class="primary" onclick="playClock()">Play</button>
            <button class="secondary" onclick="pauseClock()">Pausa</button>
            <button class="danger" onclick="stopClock()">Stop</button>
          </div>
        </div>

        <div class="panel-box">
          <div class="mini-title">Minutos</div>
          <button class="secondary" onclick="openMinutesModal()">MINUTOS</button>
          <div id="onCourtBox" class="oncourt-list"></div>
        </div>

        <div class="panel-box">
          <div class="mini-title">Estadísticas</div>
          <button class="secondary" onclick="showLiveStatsAlert()">Ver estadísticas</button>
          <div id="liveStatsBox" class="stats-live"></div>
        </div>

        <div class="panel-box">
          <div class="mini-title">Acciones</div>
          <button class="secondary" onclick="goMenu()">Volver al menú</button>
        </div>
      </div>
    </div>
  </div>

  <div id="minutesModal" class="modal">
    <div class="modal-box">
      <div class="topbar">
        <h3>MINUTOS / CAMBIOS</h3>
        <button class="secondary" onclick="closeMinutesModal()">Cerrar</button>
      </div>

      <div class="two-col">
        <div>
          <h4>En cancha</h4>
          <div id="minutesOnCourtList"></div>
        </div>
        <div>
          <h4>Citados fuera</h4>
          <div id="minutesBenchList"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="eventModal" class="modal">
    <div class="modal-box">
      <div class="topbar">
        <h3>Cargar dato</h3>
        <button class="secondary" onclick="closeEventModal()">Cerrar</button>
      </div>

      <div class="two-col">
        <div class="event-side event-own">
          <h4 id="ownTeamNameLabel">Mi equipo</h4>
          <button class="event-btn" onclick="selectBaseEvent('propio','remate')">REMATE</button>
          <button class="event-btn" onclick="selectBaseEvent('propio','falta')">FALTA</button>
          <button class="event-btn" onclick="selectBaseEvent('propio','perdida')">PÉRDIDA</button>
          <button class="event-btn" onclick="selectBaseEvent('propio','recuperacion')">RECUPERACIÓN</button>
          <button class="event-btn" onclick="selectBaseEvent('propio','tarjeta')">TARJETA</button>
        </div>

        <div class="event-side event-rival">
          <h4 id="rivalTeamNameLabel">Rival</h4>
          <button class="event-btn" onclick="selectBaseEvent('rival','remate')">REMATE</button>
          <button class="event-btn" onclick="selectBaseEvent('rival','falta')">FALTA</button>
          <button class="event-btn" onclick="selectBaseEvent('rival','perdida')">PÉRDIDA</button>
          <button class="event-btn" onclick="selectBaseEvent('rival','recuperacion')">RECUPERACIÓN</button>
          <button class="event-btn" onclick="selectBaseEvent('rival','tarjeta')">TARJETA</button>
        </div>
      </div>

      <div id="eventSubtypeArea" style="margin-top:16px;"></div>
      <div id="eventPlayerArea" style="margin-top:16px;"></div>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    }

    const DB_KEY = "futsalLabDB_full_v1";

    let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
      equipos: [],
      partidos: []
    };

    function saveDB() {
      localStorage.setItem(DB_KEY, JSON.stringify(db));
    }

    function hideAllScreens() {
      document.querySelectorAll(".screen").forEach(el => el.style.display = "none");
    }

    function goMenu() {
      hideAllScreens();
      document.getElementById("menuScreen").style.display = "block";
    }

    /* ========= INSTALACION ========= */

    let deferredPrompt = null;
    const installBtn = document.getElementById("installBtn");
    const installScreen = document.getElementById("installScreen");
    const menuScreen = document.getElementById("menuScreen");

    const isStandalone =
      window.matchMedia("(display-mode: standalone)").matches ||
      window.navigator.standalone === true;

    if (isStandalone) {
      installScreen.style.display = "none";
      menuScreen.style.display = "block";
    } else {
      installScreen.style.display = "flex";
      menuScreen.style.display = "none";
    }

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "inline-block";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    });

    /* ========= UTILIDADES IMAGEN ========= */

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    /* ========= EQUIPOS ========= */

    let currentTeamId = null;

    function openTeamsScreen() {
      hideAllScreens();
      document.getElementById("teamsScreen").style.display = "block";
      renderTeams();
    }

    function createTeam() {
      const nombre = prompt("Nombre del equipo");
      if (!nombre) return;

      db.equipos.push({
        id: Date.now(),
        nombre,
        escudo: "",
        jugadores: []
      });

      saveDB();
      renderTeams();
    }

    function renderTeams() {
      const list = document.getElementById("teamsList");
      list.innerHTML = "";

      if (db.equipos.length === 0) {
        list.innerHTML = `<div class="card">Todavía no hay equipos creados.</div>`;
        return;
      }

      db.equipos.forEach(team => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
            <div style="display:flex; align-items:center;">
              ${
                team.escudo
                  ? `<img src="${team.escudo}" class="team-logo" alt="Escudo">`
                  : `<div class="team-logo"></div>`
              }
              <div>
                <div style="font-size:20px; font-weight:bold;">${team.nombre}</div>
                <div class="small">${team.jugadores.length} jugadores</div>
              </div>
            </div>
            <div>
              <button class="secondary" onclick="openTeamDetail(${team.id})">Abrir</button>
            </div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function openTeamDetail(teamId) {
      currentTeamId = teamId;
      const team = db.equipos.find(t => t.id === teamId);

      hideAllScreens();
      document.getElementById("teamDetailScreen").style.display = "block";
      document.getElementById("teamDetailTitle").innerText = team.nombre;

      const logoPreview = document.getElementById("teamLogoPreview");
      if (team.escudo) {
        logoPreview.src = team.escudo;
        logoPreview.classList.remove("hidden");
      } else {
        logoPreview.src = "";
        logoPreview.classList.add("hidden");
      }

      document.getElementById("teamLogoInput").value = "";
      renderPlayers();
    }

    async function saveTeamLogo() {
      const input = document.getElementById("teamLogoInput");
      const file = input.files[0];
      if (!file || !currentTeamId) return;

      const base64 = await fileToBase64(file);
      const team = db.equipos.find(t => t.id === currentTeamId);
      team.escudo = base64;
      saveDB();
      openTeamDetail(currentTeamId);
    }

    function renderPlayers() {
      const team = db.equipos.find(t => t.id === currentTeamId);
      const list = document.getElementById("teamPlayersList");
      list.innerHTML = "";

      if (!team || team.jugadores.length === 0) {
        list.innerHTML = `<div class="card">Todavía no hay jugadores cargados.</div>`;
        return;
      }

      team.jugadores.forEach(player => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
            <div style="display:flex; align-items:center;">
              ${
                player.foto
                  ? `<img src="${player.foto}" class="player-photo" alt="Foto jugador">`
                  : `<div class="player-photo"></div>`
              }
              <div>
                <div style="font-size:18px; font-weight:bold;">${player.nombre}</div>
                <div class="small">N° ${player.numero || "-"} | Posición: ${player.posicion || "-"}</div>
                <div class="small">Pierna: ${player.pierna || "-"} | Peso: ${player.peso || "-"} | Altura: ${player.altura || "-"}</div>
              </div>
            </div>
            <div>
              <button class="danger" onclick="deletePlayer(${player.id})">Eliminar</button>
            </div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function showPlayerForm() {
      hideAllScreens();
      document.getElementById("playerFormScreen").style.display = "block";

      document.getElementById("playerNameInput").value = "";
      document.getElementById("playerNumberInput").value = "";
      document.getElementById("playerPositionInput").value = "";
      document.getElementById("playerFootInput").value = "";
      document.getElementById("playerWeightInput").value = "";
      document.getElementById("playerHeightInput").value = "";
      document.getElementById("playerPhotoInput").value = "";
      document.getElementById("playerPhotoPreview").src = "";
      document.getElementById("playerPhotoPreview").classList.add("hidden");
    }

    document.getElementById("playerPhotoInput").addEventListener("change", async function() {
      const file = this.files[0];
      if (!file) return;
      const base64 = await fileToBase64(file);
      const prev = document.getElementById("playerPhotoPreview");
      prev.src = base64;
      prev.classList.remove("hidden");
    });

    async function savePlayer() {
      const team = db.equipos.find(t => t.id === currentTeamId);
      if (!team) return;

      const nombre = document.getElementById("playerNameInput").value.trim();
      if (!nombre) {
        alert("El nombre del jugador es obligatorio.");
        return;
      }

      const file = document.getElementById("playerPhotoInput").files[0];
      const foto = file ? await fileToBase64(file) : "";

      team.jugadores.push({
        id: Date.now(),
        nombre,
        numero: document.getElementById("playerNumberInput").value.trim(),
        posicion: document.getElementById("playerPositionInput").value.trim(),
        pierna: document.getElementById("playerFootInput").value.trim(),
        peso: document.getElementById("playerWeightInput").value.trim(),
        altura: document.getElementById("playerHeightInput").value.trim(),
        foto
      });

      saveDB();
      openTeamDetail(currentTeamId);
    }

    function deletePlayer(playerId) {
      const team = db.equipos.find(t => t.id === currentTeamId);
      if (!team) return;
      team.jugadores = team.jugadores.filter(p => p.id !== playerId);
      saveDB();
      renderPlayers();
    }

    function backToTeamDetail() {
      openTeamDetail(currentTeamId);
    }

    /* ========= NUEVO PARTIDO ========= */

    let currentMatch = null;
    let currentOnCourtIds = [];
    let currentEvents = [];
    let matchSeconds = 0;
    let matchTimer = null;
    let selectedCourtPoint = null;
    let pendingEvent = null;
    let selectedOutPlayerId = null;

    function openNewMatchSetup() {
      hideAllScreens();
      document.getElementById("newMatchSetupScreen").style.display = "block";

      const teamSelect = document.getElementById("matchTeamSelect");
      teamSelect.innerHTML = `<option value="">Seleccionar equipo</option>`;

      db.equipos.forEach(team => {
        const op = document.createElement("option");
        op.value = team.id;
        op.textContent = team.nombre;
        teamSelect.appendChild(op);
      });

      document.getElementById("matchRivalInput").value = "";
      document.getElementById("matchDateInput").value = "";
      document.getElementById("matchCompetitionInput").value = "";
      document.getElementById("calledPlayersList").innerHTML = "";
      document.getElementById("startersList").innerHTML = "";

      teamSelect.onchange = renderCalledPlayers;
    }

    function renderCalledPlayers() {
      const teamId = Number(document.getElementById("matchTeamSelect").value);
      const calledList = document.getElementById("calledPlayersList");
      const startersList = document.getElementById("startersList");

      calledList.innerHTML = "";
      startersList.innerHTML = "";

      if (!teamId) return;

      const team = db.equipos.find(t => t.id === teamId);
      if (!team) return;

      team.jugadores.forEach(player => {
        const label = document.createElement("label");
        label.className = "check-item";
        label.innerHTML = `
          <input type="checkbox" class="called-checkbox" value="${player.id}">
          <span>${player.nombre}${player.numero ? ` (N° ${player.numero})` : ""}</span>
        `;
        calledList.appendChild(label);
      });

      document.querySelectorAll(".called-checkbox").forEach(cb => {
        cb.addEventListener("change", renderStartersFromCalled);
      });
    }

    function renderStartersFromCalled() {
      const startersList = document.getElementById("startersList");
      startersList.innerHTML = "";

      const teamId = Number(document.getElementById("matchTeamSelect").value);
      if (!teamId) return;

      const team = db.equipos.find(t => t.id === teamId);
      if (!team) return;

      const calledIds = Array.from(document.querySelectorAll(".called-checkbox:checked")).map(x => Number(x.value));
      const calledPlayers = team.jugadores.filter(p => calledIds.includes(p.id));

      calledPlayers.forEach(player => {
        const label = document.createElement("label");
        label.className = "check-item";
        label.innerHTML = `
          <input type="checkbox" class="starter-checkbox" value="${player.id}">
          <span>${player.nombre}</span>
        `;
        startersList.appendChild(label);
      });

      document.querySelectorAll(".starter-checkbox").forEach(cb => {
        cb.addEventListener("change", enforceFiveStarters);
      });
    }

    function enforceFiveStarters(e) {
      const checked = document.querySelectorAll(".starter-checkbox:checked");
      if (checked.length > 5) {
        e.target.checked = false;
        alert("Solo podés seleccionar 5 jugadores que comienzan en cancha.");
      }
    }

    function startMatch() {
      const teamId = Number(document.getElementById("matchTeamSelect").value);
      const rival = document.getElementById("matchRivalInput").value.trim();
      const fecha = document.getElementById("matchDateInput").value;
      const competencia = document.getElementById("matchCompetitionInput").value.trim();

      if (!teamId) {
        alert("Seleccioná un equipo.");
        return;
      }

      if (!rival) {
        alert("Ingresá el rival.");
        return;
      }

      const team = db.equipos.find(t => t.id === teamId);
      const calledIds = Array.from(document.querySelectorAll(".called-checkbox:checked")).map(x => Number(x.value));
      const starterIds = Array.from(document.querySelectorAll(".starter-checkbox:checked")).map(x => Number(x.value));

      if (calledIds.length === 0) {
        alert("Seleccioná jugadores citados.");
        return;
      }

      if (starterIds.length !== 5) {
        alert("Seleccioná exactamente 5 jugadores que comienzan en cancha.");
        return;
      }

      currentMatch = {
        id: Date.now(),
        teamId,
        teamName: team.nombre,
        rival,
        fecha,
        competencia,
        periodo: 1
      };

      currentOnCourtIds = [...starterIds];
      currentEvents = [];
      matchSeconds = 0;
      clearInterval(matchTimer);
      matchTimer = null;

      hideAllScreens();
      document.getElementById("matchScreen").style.display = "block";

      document.getElementById("matchHeader").innerHTML = `
        <div><strong>Equipo:</strong> ${currentMatch.teamName}</div>
        <div><strong>Rival:</strong> ${currentMatch.rival}</div>
        <div><strong>Fecha:</strong> ${currentMatch.fecha || "-"}</div>
        <div><strong>Competencia:</strong> ${currentMatch.competencia || "-"}</div>
      `;

      document.getElementById("ownTeamNameLabel").innerText = currentMatch.teamName;
      document.getElementById("rivalTeamNameLabel").innerText = currentMatch.rival;

      resetCourtVisual();
      updateClockUI();
      updateOnCourtPanel();
      updateLiveStats();
      document.getElementById("court").onclick = handleCourtClick;
    }

    function resetCourtVisual() {
      const court = document.getElementById("court");
      court.querySelectorAll(".event-dot").forEach(x => x.remove());
    }

    /* ========= RELOJ ========= */

    function updateClockUI() {
      const mm = String(Math.floor(matchSeconds / 60)).padStart(2, "0");
      const ss = String(matchSeconds % 60).padStart(2, "0");
      document.getElementById("clockDisplay").innerText = `${mm}:${ss}`;
      document.getElementById("periodLabel").innerText = currentMatch && currentMatch.periodo === 1 ? "PRIMER TIEMPO" : "SEGUNDO TIEMPO";
    }

    function playClock() {
      if (!currentMatch) return;
      if (matchTimer) return;

      matchTimer = setInterval(() => {
        matchSeconds += 1;
        updateClockUI();
      }, 1000);
    }

    function pauseClock() {
      clearInterval(matchTimer);
      matchTimer = null;
    }

    function stopClock() {
      pauseClock();
      matchSeconds = 0;
      updateClockUI();
    }

    /* ========= MINUTOS / CAMBIOS ========= */

    function getCurrentTeam() {
      if (!currentMatch) return null;
      return db.equipos.find(t => t.id === currentMatch.teamId);
    }

    function getOnCourtPlayers() {
      const team = getCurrentTeam();
      if (!team) return [];
      return team.jugadores.filter(p => currentOnCourtIds.includes(p.id));
    }

    function getBenchCalledPlayers() {
      const team = getCurrentTeam();
      if (!team) return [];
      const calledIds = new Set(
        Array.from(document.querySelectorAll(".called-checkbox:checked")).map(x => Number(x.value))
      );
      return team.jugadores.filter(p => calledIds.has(p.id) && !currentOnCourtIds.includes(p.id));
    }

    function updateOnCourtPanel() {
      const box = document.getElementById("onCourtBox");
      const players = getOnCourtPlayers();

      box.innerHTML = players.length
        ? players.map(p => `${p.nombre}${p.numero ? ` (N° ${p.numero})` : ""}`).join("<br>")
        : "Sin jugadores en cancha";
    }

    function openMinutesModal() {
      if (!currentMatch) return;
      selectedOutPlayerId = null;
      renderMinutesModal();
      document.getElementById("minutesModal").classList.add("show");
    }

    function closeMinutesModal() {
      document.getElementById("minutesModal").classList.remove("show");
      selectedOutPlayerId = null;
    }

    function renderMinutesModal() {
      const onCourtList = document.getElementById("minutesOnCourtList");
      const benchList = document.getElementById("minutesBenchList");
      onCourtList.innerHTML = "";
      benchList.innerHTML = "";

      getOnCourtPlayers().forEach(player => {
        const div = document.createElement("div");
        div.className = "player-chip" + (selectedOutPlayerId === player.id ? " selected" : "");
        div.innerText = player.nombre;
        div.onclick = () => {
          selectedOutPlayerId = selectedOutPlayerId === player.id ? null : player.id;
          renderMinutesModal();
        };
        onCourtList.appendChild(div);
      });

      getBenchCalledPlayers().forEach(player => {
        const div = document.createElement("div");
        div.className = "player-chip bench";
        div.innerText = player.nombre;
        div.onclick = () => {
          if (!selectedOutPlayerId) {
            alert("Primero seleccioná quién sale.");
            return;
          }
          makeSubstitution(selectedOutPlayerId, player.id);
        };
        benchList.appendChild(div);
      });
    }

    function makeSubstitution(outId, inId) {
      const idx = currentOnCourtIds.indexOf(outId);
      if (idx === -1) return;
      if (currentOnCourtIds.includes(inId)) return;

      currentOnCourtIds[idx] = inId;
      selectedOutPlayerId = null;
      updateOnCourtPanel();
      renderMinutesModal();
    }

    /* ========= EVENTOS EN CANCHA ========= */

    function handleCourtClick(e) {
      if (!currentMatch) return;
      if (!matchTimer) {
        alert("Poné Play para registrar eventos.");
        return;
      }

      const court = document.getElementById("court");
      const rect = court.getBoundingClientRect();

      selectedCourtPoint = {
        x: ((e.clientX - rect.left) / rect.width) * 100,
        y: ((e.clientY - rect.top) / rect.height) * 100
      };

      pendingEvent = null;
      document.getElementById("eventSubtypeArea").innerHTML = "";
      document.getElementById("eventPlayerArea").innerHTML = "";
      document.getElementById("eventModal").classList.add("show");
    }

    function closeEventModal() {
      document.getElementById("eventModal").classList.remove("show");
      pendingEvent = null;
      selectedCourtPoint = null;
    }

    function selectBaseEvent(teamSide, type) {
      pendingEvent = {
        teamSide,
        type,
        subtype: ""
      };

      const subtypeArea = document.getElementById("eventSubtypeArea");
      const playerArea = document.getElementById("eventPlayerArea");
      subtypeArea.innerHTML = "";
      playerArea.innerHTML = "";

      if (type === "remate") {
        subtypeArea.innerHTML = `
          <h4>Tipo de remate</h4>
          <button class="secondary" onclick="setSubtypeAndChoosePlayer('desviado')">Desviado</button>
          <button class="secondary" onclick="setSubtypeAndChoosePlayer('al_arco')">Al arco</button>
          <button class="secondary" onclick="setSubtypeAndChoosePlayer('gol')">Gol</button>
        `;
        return;
      }

      if (type === "tarjeta") {
        subtypeArea.innerHTML = `
          <h4>Tipo de tarjeta</h4>
          <button class="secondary" onclick="setSubtypeAndChoosePlayer('amarilla')">Amarilla</button>
          <button class="secondary" onclick="setSubtypeAndChoosePlayer('roja')">Roja</button>
        `;
        return;
      }

      setSubtypeAndChoosePlayer("");
    }

    function setSubtypeAndChoosePlayer(subtype) {
      pendingEvent.subtype = subtype || "";

      const playerArea = document.getElementById("eventPlayerArea");
      playerArea.innerHTML = "<h4>Seleccionar jugador protagonista</h4>";

      getOnCourtPlayers().forEach(player => {
        const btn = document.createElement("button");
        btn.className = "secondary";
        btn.innerText = player.nombre;
        btn.onclick = () => saveMatchEvent(player);
        playerArea.appendChild(btn);
      });
    }

    function saveMatchEvent(player) {
      if (!pendingEvent || !selectedCourtPoint) return;

      currentEvents.push({
        id: Date.now(),
        second: matchSeconds,
        period: currentMatch.periodo,
        side: pendingEvent.teamSide,
        type: pendingEvent.type,
        subtype: pendingEvent.subtype,
        playerId: player.id,
        playerName: player.nombre,
        x: selectedCourtPoint.x,
        y: selectedCourtPoint.y
      });

      drawEventDot(selectedCourtPoint.x, selectedCourtPoint.y, pendingEvent.teamSide);
      updateLiveStats();
      closeEventModal();
    }

    function drawEventDot(x, y, side) {
      const dot = document.createElement("div");
      dot.className = `event-dot ${side === "propio" ? "dot-own" : "dot-rival"}`;
      dot.style.left = x + "%";
      dot.style.top = y + "%";
      document.getElementById("court").appendChild(dot);
    }

    /* ========= ESTADISTICAS EN VIVO ========= */

    function getLiveStatsObject() {
      const ownEvents = currentEvents.filter(e => e.side === "propio");

      return {
        remates: ownEvents.filter(e => e.type === "remate").length,
        alArco: ownEvents.filter(e => e.type === "remate" && (e.subtype === "al_arco" || e.subtype === "gol")).length,
        goles: ownEvents.filter(e => e.type === "remate" && e.subtype === "gol").length,
        faltas: ownEvents.filter(e => e.type === "falta").length,
        perdidas: ownEvents.filter(e => e.type === "perdida").length,
        recuperaciones: ownEvents.filter(e => e.type === "recuperacion").length,
        tarjetas: ownEvents.filter(e => e.type === "tarjeta").length
      };
    }

    function updateLiveStats() {
      const s = getLiveStatsObject();
      document.getElementById("liveStatsBox").innerHTML = `
        Remates: ${s.remates}<br>
        Remates al arco: ${s.alArco}<br>
        Goles: ${s.goles}<br>
        Faltas: ${s.faltas}<br>
        Pérdidas: ${s.perdidas}<br>
        Recuperaciones: ${s.recuperaciones}<br>
        Tarjetas: ${s.tarjetas}
      `;
    }

    function showLiveStatsAlert() {
      const s = getLiveStatsObject();
      alert(
        `Estadísticas hasta el momento\n\n` +
        `Remates: ${s.remates}\n` +
        `Remates al arco: ${s.alArco}\n` +
        `Goles: ${s.goles}\n` +
        `Faltas: ${s.faltas}\n` +
        `Pérdidas: ${s.perdidas}\n` +
        `Recuperaciones: ${s.recuperaciones}\n` +
        `Tarjetas: ${s.tarjetas}`
      );
    }
  </script>
</body>
</html>
