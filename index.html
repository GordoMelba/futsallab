<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futsal Lab</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background-image:url("fondo1.png");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.logo{
position:absolute;
top:60px;
}

.logo img{
max-width:320px;
}

.installContainer{
display:flex;
align-items:center;
gap:20px;
background:rgba(0,0,0,0.55);
padding:25px 35px;
border-radius:16px;
}

.installBtn{
background:#22c55e;
border:none;
padding:20px 30px;
font-size:22px;
color:white;
border-radius:12px;
cursor:pointer;
}

.installBtn:hover{
opacity:0.9;
}

.icon{
width:60px;
height:60px;
}

</style>

</head>

<body>

<div id="installScreen">

<div class="logo">
<img src="logoletras.png">
</div>

<div class="installContainer">

<img src="icon.png" class="icon">

<button id="installBtn" class="installBtn" style="display:none;">
Instalar app
</button>

</div>

</div>

<div id="appMenu" style="display:none; text-align:center;">

<h1>Futsal Lab</h1>

<button style="padding:20px;font-size:22px;margin:15px;">Nuevo partido</button>

<button style="padding:20px;font-size:22px;margin:15px;">Equipos</button>

<button style="padding:20px;font-size:22px;margin:15px;">Estadísticas</button>

</div>

<script>

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

const installScreen = document.getElementById("installScreen");
const appMenu = document.getElementById("appMenu");
const installBtn = document.getElementById("installBtn");

const isStandalone =
window.matchMedia("(display-mode: standalone)").matches
|| window.navigator.standalone === true;

if(isStandalone){

installScreen.style.display="none";
appMenu.style.display="block";

document.body.style.backgroundImage="none";
document.body.style.background="#0f172a";

}

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

installBtn.style.display="block";

});

installBtn.addEventListener("click",async()=>{

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt=null;

});

</script>

</body>
</html>
