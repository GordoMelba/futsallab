<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futsal Lab</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.screen{
display:none;
padding:20px;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
gap:20px;
}

button{
padding:12px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin:5px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.menu{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
margin-top:40px;
}

.menu button{
width:260px;
font-size:22px;
}

input,select{
padding:10px;
border-radius:6px;
border:none;
margin:6px;
}

.matchLayout{
display:grid;
grid-template-columns:1fr 280px;
gap:10px;
}

.court{
background:#16a3d2;
aspect-ratio:2/1;
border:4px solid white;
position:relative;
}

.panel{
background:#111827;
padding:12px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:14px;
}

.bigclock{
font-size:30px;
text-align:center;
}

</style>

</head>

<body>

<div id="menu" class="screen" style="display:block">

<h1>Futsal Lab</h1>

<div class="menu">

<button onclick="abrirNuevoPartido()">Nuevo partido</button>

<button onclick="abrirEquipos()">Equipos</button>

</div>

</div>


<div id="equiposScreen" class="screen">

<h2>Equipos</h2>

<button onclick="crearEquipo()">Crear equipo</button>

<button onclick="volverMenu()">Volver</button>

<div id="listaEquipos"></div>

</div>


<div id="partidoSetup" class="screen">

<h2>Nuevo partido</h2>

<select id="equipoSelect"></select>

<input id="rivalInput" placeholder="Rival">

<input type="date" id="fechaInput">

<input id="torneoInput" placeholder="Competencia / Torneo">

<h3>Jugadores que empiezan en cancha</h3></h3>

<div id="jugadoresTitulares"></div>

<button onclick="iniciarPartido()">Iniciar partido</button>

<button onclick="volverMenu()">Volver</button>

</div>


<div id="partidoScreen" class="screen">

<div class="matchLayout">

<div>

<div>

<div id="datosPartido"></div>

<div class="court" id="cancha"></div>

</div>

</div>

<div class="panel">

<div>

PRIMER TIEMPO

<div id="reloj" class="bigclock">00:00</div>

<button onclick="play()">Play</button>

<button onclick="pause()">Pausa</button>

<button onclick="stop()">Stop</button>

</div>

<div>

<h4>MINUTOS</h4>

<button onclick="hacerCambio()">Cambio</button>

<div id="jugadoresCancha"></div>

</div>

<div>

<h4>ESTADISTICAS</h4>

<div id="stats"></div>

</div>

</div>

</div>

</div>

<script>

let db=JSON.parse(localStorage.getItem("futsalDB"))||{equipos:[]}

function saveDB(){

localStorage.setItem("futsalDB",JSON.stringify(db))

}

function hideScreens(){

document.querySelectorAll(".screen").forEach(s=>s.style.display="none")

}

function volverMenu(){

hideScreens()

menu.style.display="block"

}

function abrirEquipos(){

hideScreens()

equiposScreen.style.display="block"

renderEquipos()

}

function crearEquipo(){

let nombre=prompt("Nombre equipo")

if(!nombre)return

db.equipos.push({id:Date.now(),nombre,jugadores:[]})

saveDB()

renderEquipos()

}

function renderEquipos(){

listaEquipos.innerHTML=""

db.equipos.forEach(e=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`${e.nombre}`

listaEquipos.appendChild(div)

})

}

function abrirNuevoPartido(){

hideScreens()

partidoSetup.style.display="block"

equipoSelect.innerHTML=""

db.equipos.forEach(e=>{

let o=document.createElement("option")

o.value=e.id

o.text=e.nombre

equipoSelect.appendChild(o)

})

equipoSelect.onchange=cargarJugadores

cargarJugadores()

}

let titulares=[]

function cargarJugadores(){

let equipo=db.equipos.find(e=>e.id==equipoSelect.value)

jugadoresTitulares.innerHTML=""

equipo.jugadores.forEach(j=>{

let chk=document.createElement("input")

chk.type="checkbox"

chk.value=j.id

chk.onchange=seleccionarTitulares

jugadoresTitulares.appendChild(chk)

jugadoresTitulares.appendChild(document.createTextNode(j.nombre))

jugadoresTitulares.appendChild(document.createElement("br"))

})

}

function seleccionarTitulares(){

let checks=document.querySelectorAll("#jugadoresTitulares input:checked")

titulares=[...checks].map(c=>parseInt(c.value))

if(titulares.length>5){

alert("Solo 5 jugadores")

this.checked=false

}

}

let jugadoresEnCancha=[]

let eventos=[]
  let partidoActual={}

function iniciarPartido(){

if(titulares.length!==5){
alert("Seleccionar 5 jugadores")
return
}

let equipo=db.equipos.find(e=>e.id==equipoSelect.value)

let rival=rivalInput.value
let fecha=fechaInput.value
let torneo=torneoInput.value

jugadoresEnCancha=equipo.jugadores.filter(j=>titulares.includes(j.id))

partidoActual={
equipo:equipo.nombre,
rival:rival,
fecha:fecha,
torneo:torneo
}

hideScreens()

partidoScreen.style.display="block"

datosPartido.innerHTML = `
<b>${partidoActual.equipo}</b> vs <b>${partidoActual.rival}</b><br>
${partidoActual.fecha} - ${partidoActual.torneo}
`

actualizarPanel()

cancha.onclick=registrarEvento

}

let equipo=db.equipos.find(e=>e.id==equipoSelect.value)

let rival=rivalInput.value
let fecha=fechaInput.value
let torneo=torneoInput.value

jugadoresEnCancha=equipo.jugadores.filter(j=>titulares.includes(j.id))

partidoActual={
equipo:equipo.nombre,
rival:rival,
fecha:fecha,
torneo:torneo
}

hideScreens()

partidoScreen.style.display="block"

actualizarPanel()

cancha.onclick=registrarEvento

}

let equipo=db.equipos.find(e=>e.id==equipoSelect.value)

jugadoresEnCancha=equipo.jugadores.filter(j=>titulares.includes(j.id))

hideScreens()

partidoScreen.style.display="block"

actualizarPanel()

cancha.onclick=registrarEvento

}

function actualizarPanel(){

jugadoresCancha.innerHTML=jugadoresEnCancha.map(j=>j.nombre).join("<br>")

}

function hacerCambio(){

let sale=prompt("Sale")

let entra=prompt("Entra")

let equipo=db.equipos.find(e=>e.id==equipoSelect.value)

let jugadorSale=jugadoresEnCancha.find(j=>j.nombre===sale)

let jugadorEntra=equipo.jugadores.find(j=>j.nombre===entra)

jugadoresEnCancha=jugadoresEnCancha.filter(j=>j.id!==jugadorSale.id)

jugadoresEnCancha.push(jugadorEntra)

actualizarPanel()

}

let seconds=0

let timer=null

function play(){

if(timer)return

timer=setInterval(()=>{

seconds++

actualizarReloj()

},1000)

}

function pause(){

clearInterval(timer)

timer=null

}

function stop(){

pause()

seconds=0

actualizarReloj()

}

function actualizarReloj(){

let m=Math.floor(seconds/60).toString().padStart(2,"0")

let s=(seconds%60).toString().padStart(2,"0")

reloj.innerText=m+":"+s

}

function registrarEvento(e){

if(!timer)return

let rect=cancha.getBoundingClientRect()

let x=(e.clientX-rect.left)/rect.width*100

let y=(e.clientY-rect.top)/rect.height*100

let tipo=prompt("remate / falta / perdida / recuperacion / tarjeta")

let jugador=prompt("Jugador: "+jugadoresEnCancha.map(j=>j.nombre).join(", "))

let j=jugadoresEnCancha.find(p=>p.nombre===jugador)

if(!j)return

eventos.push({tipo,jugador:j.id})

let punto=document.createElement("div")

punto.style.position="absolute"
punto.style.width="12px"
punto.style.height="12px"
punto.style.borderRadius="50%"
punto.style.background="red"
punto.style.left=x+"%"
punto.style.top=y+"%"

cancha.appendChild(punto)

actualizarStats()

}

function actualizarStats(){

let remates=eventos.filter(e=>e.tipo==="remate").length
let faltas=eventos.filter(e=>e.tipo==="falta").length
let perdidas=eventos.filter(e=>e.tipo==="perdida").length
let recuperaciones=eventos.filter(e=>e.tipo==="recuperacion").length
let tarjetas=eventos.filter(e=>e.tipo==="tarjeta").length

stats.innerHTML=`

Remates: ${remates}<br>
Faltas: ${faltas}<br>
Perdidas: ${perdidas}<br>
Recuperaciones: ${recuperaciones}<br>
Tarjetas: ${tarjetas}

`

}

</script>

</body>
</html>
