<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futsal Lab</title>
<link rel="manifest" href="manifest.json">
<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:120px;
}

button{
padding:20px;
font-size:20px;
margin:20px;
border-radius:12px;
border:none;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

</style>

</head>

<body>

<h1>FUTSAL LAB</h1>

<button>Nuevo partido</button>

<button>Equipos</button>

<button>Estadísticas</button>

  <button id="installBtn" style="display:none; padding:20px; font-size:22px; margin-top:40px; border-radius:12px; background:#22c55e; color:white;">
Instalar app
</button>

  <script>
if ("serviceWorker" in navigator) {
 navigator.serviceWorker.register("service-worker.js");
   .then(function() {
    console.log("Service Worker registrado");
  });
}
    let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {

 e.preventDefault();

 deferredPrompt = e;

 installBtn.style.display = "block";

});

installBtn.addEventListener("click", async () => {

 installBtn.style.display = "none";

 deferredPrompt.prompt();

 const { outcome } = await deferredPrompt.userChoice;

 deferredPrompt = null;

});
</script>

</body>

</html>
